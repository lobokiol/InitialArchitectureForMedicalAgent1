# Windows / 本地开发：Redis + Elasticsearch
# 用法：docker compose -f sourceData/docker-compose.local.yml up -d

services:
  redis:
    image: redis/redis-stack:latest
    container_name: medical-agent-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: medical-agent-es
    ports:
      - "9200:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    restart: unless-stopped

volumes:
  redis-data:
  es-data:
